<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      max-width: 400px;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 30px;
    }

    .links div {
      display: block;
      border: 1px solid #fff;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      color: #fff;
      opacity: 0.6;
      cursor: not-allowed;
    }

    footer {
      margin-top: 30px;
      font-size: 12px;
      color: #777;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>COMING SOON</h1>
    <p>We’re working on something amazing. Stay connected!</p>

    <div class="links">
      <div>Instagram</div>
      <div>X (Twitter)</div>
      <div>LinkedIn</div>
      <div>Email</div>
      <div>Phone</div>
      <div>Website</div>
    </div>

    <footer>
      © 2026 Your Company
    </footer>
  </div>

</body>
</html>
